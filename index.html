<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan EMI Calculator</title>

    <STYle>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
        }

        .hero{
            width:100%;
            height:100vh;

            background:linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
            url("https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=1600&q=80");

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .overlay{
            width:100%;
            height:100%;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .content{
            width:700px;
            text-align:center;
            color:white;
            padding:20px;
        }

        .content h1{
            font-size:60px;
            margin-bottom:20px;
        }

        .content p{
            font-size:20px;
            line-height:1.8;
            margin-bottom:40px;
        }

        .btn{
            display:inline-block;
            padding:15px 40px;
            background:#00b894;
            color:white;
            text-decoration:none;
            font-size:20px;
            border-radius:8px;
            transition:.3s;
        }

        .btn:hover{
            background:#019875;
            transform:translateY(-3px);
        }

    </STYle>
</head>

<body>

    <section class="hero">

        <div class="overlay">

            <div class="content">

                <h1>Loan EMI Calculator</h1>

                <p>
                    Calculate your monthly loan repayments quickly and accurately.
                    Simply enter the loan amount, interest rate, and loan tenure to
                    estimate your monthly EMI.
                </p>

                <a href="calculator.html" class="btn">
                    Get Started
                </a>

            </div>

        </div>

    </section>

</body>
</html>
